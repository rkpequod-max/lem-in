<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lem-in Visualiseur WASM</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e1e1e; color: #fff; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .panel { flex: 1; background: #252525; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 200px; background: #1e1e1e; color: #0f0; border: 1px solid #444; padding: 10px; font-family: monospace; }
        #output { background: #000; border: 1px solid #333; padding: 10px; height: 200px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; color: #0ff; }
        canvas { background: #1a1a1a; border: 2px solid #444; border-radius: 8px; margin-top: 20px; width: 100%; height: 400px; }
        button { padding: 12px 24px; background: #4CAF50; color: white; border: none; cursor: pointer; font-size: 16px; border-radius: 6px; margin: 5px; }
        button:hover { background: #45a049; }
        button:disabled { background: #555; cursor: not-allowed; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .stat-box { background: #2d2d2d; padding: 10px; border-radius: 4px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #4CAF50; }
        .stat-label { font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <h1>🐜 Lem-in Visualiseur (WebAssembly)</h1>
    <div class="container">
        <div class="panel">
            <h3>Carte d'entrée</h3>
            <textarea id="inputMap">4

##start
1 0 0
2 1 0
3 0 1
4 1 1
##end
5 2 0

1-2
1-3
2-4
3-4
4-5</textarea>
            <div>
                <button onclick="runLemIn()" id="runBtn">▶️ Résoudre</button>
                <button onclick="togglePause()" id="pauseBtn" disabled>⏸️ Pause</button>
                <button onclick="resetVisualizer()">🔄 Reset</button>
            </div>
            <div class="stats">
                <div class="stat-box"><div class="stat-value" id="statTurns">0</div><div class="stat-label">Tours</div></div>
                <div class="stat-box"><div class="stat-value" id="statAnts">0</div><div class="stat-label">Fourmis</div></div>
                <div class="stat-box"><div class="stat-value" id="statArrived">0</div><div class="stat-label">Arrivées</div></div>
                <div class="stat-box"><div class="stat-value" id="statPaths">0</div><div class="stat-label">Chemins</div></div>
            </div>
        </div>
        <div class="panel">
            <h3>Sortie & Visualisation</h3>
            <div id="output">En attente...</div>
            <canvas id="visCanvas"></canvas>
        </div>
    </div>
    <script>
        let Module = null, isPaused = false, currentTurn = 0, turnsData = [], roomsData = [], linksData = [];
        
        if (typeof createLemInModule === 'function') {
            createLemInModule().then((instance) => {
                Module = instance;
                console.log("✅ WASM chargé!");
            }).catch(err => {
                document.getElementById('output').textContent = 'Module WASM non trouvé. Compilez avec "make web"';
            });
        } else {
            document.getElementById('output').textContent = 'Module WASM non trouvé. Compilez avec "make web"';
        }

        function runLemIn() {
            if (!Module) { alert("WASM pas chargé"); return; }
            const input = document.getElementById('inputMap').value;
            document.getElementById('output').textContent = '';
            try {
                const output = Module.ccall('run_lemin', 'string', ['string'], [input]);
                document.getElementById('output').textContent = output;
                parseOutput(output);
                drawVisualization();
                document.getElementById('pauseBtn').disabled = false;
                document.getElementById('runBtn').disabled = true;
                animateAnts();
            } catch (e) { document.getElementById('output').textContent += "\nErreur: " + e.message; }
        }

        function parseOutput(output) {
            turnsData = []; roomsData = []; linksData = [];
            const mapLines = document.getElementById('inputMap').value.split('\n');
            let section = 0, roomId = 0, roomMap = {};
            
            for (const line of mapLines) {
                if (line.startsWith('##') || line.startsWith('#')) continue;
                if (section === 0 && /^\d+$/.test(line.trim())) { section = 1; continue; }
                if (section === 1) {
                    const parts = line.trim().split(' ');
                    if (parts.length === 3 && /^\d+$/.test(parts[1]) && /^\d+$/.test(parts[2])) {
                        roomMap[parts[0]] = { id: roomId++, name: parts[0], x: parseInt(parts[1]), y: parseInt(parts[2]), start: parts[0]==='1'||parts[0]==='S', end: parts[0]==='5'||parts[0]==='E' };
                        roomsData.push(roomMap[parts[0]]);
                    } else section = 2;
                }
                if (section === 2 && line.includes('-')) {
                    const [r1, r2] = line.split('-');
                    if (roomMap[r1] && roomMap[r2]) linksData.push([roomMap[r1], roomMap[r2]]);
                }
            }
            
            for (const line of output.split('\n')) {
                if (line.startsWith('L')) {
                    const moves = line.split(' ').map(m => { const match = m.match(/L(\d+)-(.+)/); return match ? { ant: parseInt(match[1]), room: match[2] } : null; }).filter(Boolean);
                    if (moves.length > 0) turnsData.push(moves);
                }
            }
            document.getElementById('statTurns').textContent = turnsData.length;
            document.getElementById('statAnts').textContent = mapLines[0];
            currentTurn = 0;
        }

        function drawVisualization() {
            const canvas = document.getElementById('visCanvas');
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (roomsData.length === 0) return;
            
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            roomsData.forEach(r => { minX = Math.min(minX, r.x); maxX = Math.max(maxX, r.x); minY = Math.min(minY, r.y); maxY = Math.max(maxY, r.y); });
            const scale = Math.min(canvas.width, canvas.height) * 0.8 / Math.max(maxX - minX || 1, maxY - minY || 1);
            const cx = canvas.width / 2, cy = canvas.height / 2;
            
            ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
            linksData.forEach(([r1, r2]) => {
                ctx.beginPath();
                ctx.moveTo(cx + (r1.x - (minX+maxX)/2) * scale, cy - (r1.y - (minY+maxY)/2) * scale);
                ctx.lineTo(cx + (r2.x - (minX+maxX)/2) * scale, cy - (r2.y - (minY+maxY)/2) * scale);
                ctx.stroke();
            });
            
            roomsData.forEach(r => {
                const x = cx + (r.x - (minX+maxX)/2) * scale, y = cy - (r.y - (minY+maxY)/2) * scale;
                ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.fillStyle = r.start ? '#4CAF50' : r.end ? '#f44336' : '#2196F3';
                ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.font = '12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(r.name, x, y);
            });
        }

        function animateAnts() {
            if (isPaused || currentTurn >= turnsData.length) {
                if (currentTurn >= turnsData.length) {
                    document.getElementById('statArrived').textContent = document.getElementById('inputMap').value.split('\n')[0];
                    document.getElementById('runBtn').disabled = false;
                    document.getElementById('pauseBtn').disabled = true;
                }
                return;
            }
            drawVisualization();
            const canvas = document.getElementById('visCanvas'), ctx = canvas.getContext('2d');
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            roomsData.forEach(r => { minX = Math.min(minX, r.x); maxX = Math.max(maxX, r.x); minY = Math.min(minY, r.y); maxY = Math.max(maxY, r.y); });
            const scale = Math.min(canvas.width, canvas.height) * 0.8 / Math.max(maxX - minX || 1, maxY - minY || 1);
            const cx = canvas.width / 2, cy = canvas.height / 2;
            
            turnsData[currentTurn].forEach(move => {
                const room = roomsData.find(r => r.name === move.room);
                if (room) {
                    const x = cx + (room.x - (minX+maxX)/2) * scale, y = cy - (room.y - (minY+maxY)/2) * scale;
                    ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI * 2);
                    ctx.fillStyle = '#FFEB3B'; ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
                    ctx.fillStyle = '#000'; ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('L' + move.ant, x, y);
                }
            });
            document.getElementById('statArrived').textContent = currentTurn + 1;
            currentTurn++;
            setTimeout(() => requestAnimationFrame(animateAnts), 300);
        }

        function togglePause() { isPaused = !isPaused; document.getElementById('pauseBtn').textContent = isPaused ? '▶️ Reprendre' : '⏸️ Pause'; if (!isPaused) animateAnts(); }
        function resetVisualizer() { isPaused = false; currentTurn = 0; document.getElementById('pauseBtn').textContent = '⏸️ Pause'; document.getElementById('pauseBtn').disabled = true; document.getElementById('runBtn').disabled = false; document.getElementById('statArrived').textContent = '0'; document.getElementById('output').textContent = 'En attente...'; drawVisualization(); }
        
        setTimeout(() => { drawVisualization(); }, 500);
    </script>
</body>
</html>
