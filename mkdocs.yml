site_name: Lem-in Documentation
site_description: Documentation complète et guide de compréhension du projet Lem-in (42 School)
repo_url: https://github.com/rkpequod-max/lem-in
repo_name: rkpequod-max/lem-in
theme:
  name: material
  language: fr
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables
nav:
  - Accueil: index.md
  - Documentation Technique: LEM_IN_EXPLICATIF.md
  - Code Source: https://github.com/rkpequod-max/lem-in/tree/main
