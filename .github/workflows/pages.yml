name: Deploy Lem-in Docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Converter
        run: npm install -g marked

      - name: Convert MD to HTML
        run: |
          mkdir -p ./_site
          # On prend ton fichier explicatif et on le convertit en HTML propre
          echo '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Lem-in Documentation</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;line-height:1.6;max-width:900px;margin:0 auto;padding:20px;color:#333}h1,h2,h3{color:#2c3e50;border-bottom:2px solid #eee;padding-bottom:10px}code{background:#f4f4f4;padding:2px 5px;border-radius:3px;font-family:monospace}pre{background:#2d2d2d;color:#f8f8f2;padding:15px;overflow-x:auto;border-radius:5px}table{border-collapse:collapse;width:100%;margin:20px 0}th,td{border:1px solid #ddd;padding:8px;text-align:left}th{background-color:#f2f2f2}a{color:#3498db;text-decoration:none}a:hover{text-decoration:underline}</style></head><body>' > ./_site/index.html
          marked docs/LEM_IN_EXPLICATIF.md >> ./_site/index.html
          echo '</body></html>' >> ./_site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
